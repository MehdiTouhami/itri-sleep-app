[phases.setup]
nixPkgs = ["python312", "python312Packages.pip"]

[phases.install]
cmds = ["pip install -r backend/requirements.txt"]

[phases.build]
cmds = ["python backend/ingest.py && python backend/ingest_research.py"]

[start]
cmd = "bash -c 'cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT'"
